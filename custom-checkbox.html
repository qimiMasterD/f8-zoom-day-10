<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Scholars - Education, University & LMS</title>

        <!-- Font Awesome -->
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
            integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
            crossorigin="anonymous"
            referrerpolicy="no-referrer"
        />

        <!-- Google Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Bree+Serif&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Libre+Franklin:ital,wght@0,100..900;1,100..900&family=PT+Sans:ital,wght@0,400;0,700;1,400;1,700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap"
            rel="stylesheet"
        />

        <!-- CSS -->
        <link rel="stylesheet" href="./css/reset.css" />
        <link rel="stylesheet" href="./css/custom-checkbox.css" />
    </head>
    <body>
        <div class="wrapper">
            <div class="container">
                <div></div>
                <span>Checkbox</span>
                <span>Radio</span>
                <span>Switch</span>
                <span>On</span>
                <label class="checkbox-label" for="checkbox">
                    <input
                        type="checkbox"
                        name=""
                        id="checkbox"
                        hidden
                        checked
                    />
                    <div class="custom-checkbox"></div>
                </label>
                <label class="radio-label" for="radio">
                    <input type="radio" name="" id="radio" hidden checked />
                    <div class="custom-radio"></div>
                </label>
                <label class="switch-label" for="switch">
                    <input type="checkbox" name="" id="switch" hidden checked />
                    <div class="custom-switch"></div>
                </label>
                <span>Off</span>
                <label class="checkbox-label" for="checkbox1">
                    <input type="checkbox" name="" id="checkbox1" hidden />
                    <div class="custom-checkbox"></div>
                </label>
                <label class="radio-label" for="radio1">
                    <input type="radio" name="" id="radio1" hidden />
                    <div class="custom-radio"></div>
                </label>
                <label class="switch-label" for="switch1">
                    <input type="checkbox" name="" id="switch1" hidden />
                    <div class="custom-switch"></div>
                </label>
            </div>
        </div>
    </body>
</html>
